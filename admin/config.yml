backend:
  name: github
  repo: Dace369/KMMK-web
  branch: main
  base_url: https://kmmk-web.vercel.app
  auth_endpoint: api/auth

media_library:
  name: cloudinary
  config:
    cloud_name: djguaaz7z
    api_key: 359455984297588
    upload_preset: "KMMK uploads"

# media_folder: "assets/uploads"
# public_folder: "/assets/uploads"

collections:
  - name: "portfolio"
    label: "Portfólió"
    folder: "_portfolio"
    create: true
    fields:
      - {label: "Cím", name: "title", widget: "string"}
      - {label: "Kategória", name: "category", widget: "string"}
      - {label: "Anyag", name: "material", widget: "string", required: false}
      - {label: "Elkészítési idő", name: "duration", widget: "string", required: false, hint: "Pl. 2 hét"}
      - label: "Képek"
        name: "images"
        widget: "list"
        field: {label: "Kép", name: "image", widget: "image"}
      - {label: "Leírás", name: "description", widget: "text", required: false}

  - name: "reviews"
    label: "Vélemények"
    folder: "_reviews"
    create: true
    fields:
      - {label: "Név", name: "name", widget: "string"}
      - {label: "Helyszín & projekt", name: "location", widget: "string"}
      - {label: "Vélemény szövege", name: "text", widget: "text"}
      - {label: "Csillagok (1-5)", name: "stars", widget: "number", min: 1, max: 5}

  - name: "settings"
    label: "Beállítások"
    files:
      - label: "Elérhetőségek"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - {label: "Telefonszám", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Helyszín", name: "location", widget: "string"}
